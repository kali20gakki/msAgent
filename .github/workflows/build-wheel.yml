name: Build Wheel

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-wheel.yml"
      - ".python-version"
      - "pyproject.toml"
      - "uv.lock"
      - "hatch_build.py"
      - "scripts/build_whl.sh"
      - "resources/**"
      - "skills/**"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/build-wheel.yml"
      - ".python-version"
      - "pyproject.toml"
      - "uv.lock"
      - "hatch_build.py"
      - "scripts/build_whl.sh"
      - "resources/**"
      - "skills/**"
      - "src/**"
      - "tests/**"

permissions:
  contents: read

concurrency:
  group: build-wheel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install project and test dependencies
        run: uv sync --dev

      - name: Run pytest
        run: uv run pytest -q

  build-wheel:
    name: build-wheel-${{ matrix.os }}
    needs: tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Build and verify wheel
        shell: bash
        env:
          VERIFY_WHEEL_INSTALL: "1"
        run: bash scripts/build_whl.sh

      - name: Collect wheel metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          WHEEL_PATH="$(find dist -maxdepth 1 -type f -name '*.whl' | sort | tail -n 1)"
          test -n "${WHEEL_PATH}"
          WHEEL_NAME="$(basename "${WHEEL_PATH}")"
          if command -v sha256sum >/dev/null 2>&1; then
            SHA256="$(sha256sum "${WHEEL_PATH}" | awk '{print $1}')"
          else
            SHA256="$(shasum -a 256 "${WHEEL_PATH}" | awk '{print $1}')"
          fi
          {
            echo "wheel_path=${WHEEL_PATH}"
            echo "wheel_name=${WHEEL_NAME}"
            echo "sha256=${SHA256}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: ${{ steps.meta.outputs.wheel_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Add build summary
        shell: bash
        env:
          RUNNER_OS: ${{ runner.os }}
          WHEEL_NAME: ${{ steps.meta.outputs.wheel_name }}
          SHA256: ${{ steps.meta.outputs.sha256 }}
        run: |
          {
            echo "## Wheel validation (${RUNNER_OS})"
            echo
            echo "- Artifact: \`wheel-${{ matrix.os }}\`"
            echo "- Wheel: \`${WHEEL_NAME}\`"
            echo "- SHA256: \`${SHA256}\`"
            echo "- Validation: \`bash scripts/build_whl.sh\` with \`VERIFY_WHEEL_INSTALL=1\`"
          } >> "${GITHUB_STEP_SUMMARY}"
