name: Build Wheel

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-wheel.yml"
      - ".github/workflows/publish-release.yml"
      - ".python-version"
      - "pyproject.toml"
      - "uv.lock"
      - "scripts/build_whl.sh"
      - "scripts/install.sh"
      - "resources/**"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/build-wheel.yml"
      - ".github/workflows/publish-release.yml"
      - ".python-version"
      - "pyproject.toml"
      - "uv.lock"
      - "scripts/build_whl.sh"
      - "scripts/install.sh"
      - "resources/**"
      - "src/**"
      - "tests/**"

permissions:
  contents: read

concurrency:
  group: build-wheel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install project and test dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest -q

  build-wheel:
    name: build-wheel
    needs: unit-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel
        run: bash scripts/build_whl.sh

      - name: Collect wheel metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          WHEEL_PATH="$(find dist -maxdepth 1 -type f -name '*.whl' | sort | tail -n 1)"
          test -n "${WHEEL_PATH}"
          WHEEL_NAME="$(basename "${WHEEL_PATH}")"
          SHA256="$(sha256sum "${WHEEL_PATH}" | awk '{print $1}')"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "wheel_name=${WHEEL_NAME}"
            echo "sha256=${SHA256}"
            echo "run_url=${RUN_URL}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 14

      - name: Add build summary
        env:
          RUN_URL: ${{ steps.meta.outputs.run_url }}
          WHEEL_NAME: ${{ steps.meta.outputs.wheel_name }}
          SHA256: ${{ steps.meta.outputs.sha256 }}
        run: |
          {
            echo "## Wheel build"
            echo
            echo "- Run page: ${RUN_URL}"
            echo "- Artifact: \`wheel\`"
            echo "- Wheel: \`${WHEEL_NAME}\`"
            echo "- SHA256: \`${SHA256}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  smoke-install:
    name: smoke-install-${{ matrix.os }}
    needs: build-wheel
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: ${{ runner.temp }}/dist

      - name: Install wheel with pip
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          WHEEL_PATH="$(find dist -maxdepth 1 -type f -name '*.whl' | head -n 1)"
          test -n "${WHEEL_PATH}"
          python -m pip install "${WHEEL_PATH}"

      - name: Smoke test installed package
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import shutil
          from importlib import import_module
          from importlib.resources import files

          import_module("msagent.cli.bootstrap.app")
          config = json.loads(
              files("resources").joinpath("configs", "default", "config.mcp.json").read_text(
                  encoding="utf-8"
              )
          )
          server = config["mcpServers"]["msprof-mcp"]
          assert server["command"] == "msprof-mcp"
          assert server["args"] == []
          assert shutil.which("msprof-mcp"), "msprof-mcp executable is not on PATH"
          print("cross-platform install smoke test passed")
          PY

  smoke-install-script:
    name: smoke-install-script-${{ matrix.os }}
    needs: build-wheel
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: ${{ runner.temp }}/dist

      - name: Smoke test curl installer with local wheel
        shell: bash
        env:
          UV_CACHE_DIR: ${{ runner.temp }}/uv-cache
          UV_TOOL_BIN_DIR: ${{ runner.temp }}/bin
          UV_TOOL_DIR: ${{ runner.temp }}/tools
        run: |
          set -euo pipefail
          WHEEL_PATH="$(find "${RUNNER_TEMP}/dist" -maxdepth 1 -type f -name '*.whl' | head -n 1)"
          test -n "${WHEEL_PATH}"
          MSAGENT_PACKAGE_SPEC="${WHEEL_PATH}" bash scripts/install.sh
          "${UV_TOOL_BIN_DIR}/msagent" --version
          test -x "${UV_TOOL_BIN_DIR}/msprof-mcp"
