version: __APP_VERSION__
name: Quantizer
description: Automatically adapt and tune model for quantization accuracy
prompt:
  - prompts/agents/Quantizer.md
llm: default
checkpointer: sqlite
default: false
subagents:
  - quant-tuning-practice-generator
  - quant-tuning-evaluation-generator
  - quant-tuning-evaluator
  - quant-tuning-quantizer
  - msmodelslim-model-analysis
  - msmodelslim-model-adapt
recursion_limit: 1000
tools:
  patterns:
    - impl:deepagents:*
  use_catalog: false
  output_max_tokens: 10000
skills:
  patterns:
    - default:quantization-accuracy-tuning-orchestrator
    - default:gen-evaluation-cfg
    - default:quant-tuning-evaluate
    - default:tune-practice-cfg
    - default:quant-tuning-quantize
    - default:msmodelslim-model-analysis
    - default:msmodelslim-model-adapt
    - default:msmodelslim-adapter-verification
    - default:msmodelslim-layer-wise-quantization
    - default:msmodelslim-model-dequant
    - default:msmodelslim-quick-quant
  use_catalog: false
compression:
  auto_compress_enabled: true
  auto_compress_threshold: 0.8
  llm: default
  prompt:
    - prompts/shared/general_compression.md
    - prompts/suffixes/environments.md
retry:
  enabled: true
  model:
    enabled: true
    max_retries: 5
    timeout: 120.0
  tool:
    enabled: true
    max_retries: 5
    tools: null
    retry_on: null
    on_failure: continue
    backoff_factor: 2.0
    initial_delay: 5.0
    max_delay: 60.0
    jitter: true
audit_log:
  enabled: true
