version: "0.1"
name: msagent
description: Ascend NPU profiling analysis agent with msprof-mcp-first workflow
prompt:
  - prompts/agents/msagent.md
  - prompts/suffixes/environments.md
llm: default
checkpointer: sqlite
default: true
recursion_limit: 1000
tools:
  patterns:
    - impl:*:*
    - internal:*:*
    - mcp:*:*
  use_catalog: false
  output_max_tokens: 10000
skills:
  patterns:
    - '*:*'
  use_catalog: false
compression:
  auto_compress_enabled: true
  auto_compress_threshold: 0.8
  llm: default
  prompt:
    - prompts/shared/general_compression.md
    - prompts/suffixes/environments.md
retry:
  enabled: true
  llm_max_retries: 5
  llm_base_delay: 5.0
  llm_max_delay: 60.0
  enable_circuit_breaker: false
  circuit_breaker_threshold: 5
  circuit_breaker_recovery: 60.0
